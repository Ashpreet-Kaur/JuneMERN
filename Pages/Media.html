      <!--  while specifying the path for the file in src attribute of an img , we have two main types: relative and absolute  
       ** ABSOLUTE PATH: it specifies the full URL of the image, including the protocol (http:// or https://) and the domain name.
       ** RELATIVE PATH: it specifies the path to the image file relative to the location of the HTML file. It can be a simple filename if the image is in the same directory as the HTML file, or it can include subdirectories if the image is located in a different folder.  
      While specifying the relative path, we can use the following notations:
       ** ./ : it refers to the current directory where the HTML file is located.
       ** ../ : it refers to the parent directory of the current directory. It is used to navigate up one level in the directory structure.
       ** / : it refers to the root directory of the website. It is used to specify an absolute path from the root of the website.
