<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <!-- Forms let users enter information and send it to the website. -->




    <h1>Form</h1>
    <p>This is a simple form.</p>

    <!-- The <label> tag describes the input that follows it. -->
    <!-- The <input> tag creates a field where the user can type or choose data. -->
    <!-- The type attribute tells the browser what kind of input is expected. -->
    <form method="get" action="Basics.html" novalidate>
        <label for="username">Username</label>
        <input id="username" type="text" name="username" required minlength="5" placeholder="Enter Name">
        <!-- type="text" creates a normal text field. -->
        <br><br>

        <label>Email</label>
        <input type="email" name="email" required>
        <!-- type="email" makes the field expect an email address. -->
        <br><br>

        <label>Password</label>
        <input type="password" name="password">
        <!-- type="password" hides the text while the user types. -->
        <br><br>

        <label>DoB</label>
        <input type="datetime-local" name="dob">
        <!-- type="datetime-local" lets the user choose a date and time. -->
        <br><br>

        <label>Age</label>
        <input type="number" name="age" max="100" min="1">
        <!-- type="number" allows only number input. -->
        <br><br>

        <label>Contact</label>
        <input type="tel" name="contact">
        <!-- type="tel" is used for phone numbers. -->
        <br><br>

        <label>Gender</label>
        <!-- Radio buttons let the user choose only one option. -->
        <input type="radio" name="gender" value="male" required>Male
        <input type="radio" name="gender" value="female">Female
        <input type="radio" name="gender" value="other">Other
        <br><br>

        <label>Skills</label>
        <!-- Checkboxes allow more than one choice. -->
        <input type="checkbox" name="skills" value="mern" required>MERN
        <input type="checkbox" name="skills" value="php">PHP
        <input type="checkbox" name="skills" value="python">Python
        <input type="checkbox" name="skills" value="java">Java
        <br><br>

        <label>City</label>
        <select name="city" required>
            <option disabled selected>--Select a City--</option>
            <option>Amritsar</option>
            <option>Chandigarh</option>
            <option>Jalandhar</option>
            <option >Patiala</option>
        </select>
        <br><br>

        <label>Comment</label>
        <textarea cols="30" rows="5"></textarea>
        <br><br>

        <!-- The submit button sends the form content to the server. -->
        <button>Submit</button>
    </form>



    <hr>

    <br><br><br><br>




    <!-- fieldset and legend tags group related form elements.
        fieldset creates a box around the related elements, and legend provides a caption for the fieldset.
    -->
    


<form>
    <fieldset>
        <legend>Personal Information</legend>
        <label>Name</label>
        <input type="text">
    </fieldset>
    <fieldset>
        <legend>Contact Information</legend>
        <label>Email</label>
        <input type="email">
    </fieldset>
</form>



</body>
</html>
