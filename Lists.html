<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>
<body>
    <!-- Lists help break content into smaller, easier-to-read pieces. -->

    <h1>HTML Lists</h1>

    <!-- Ordered lists (<ol>) show items in a specific sequence. -->
    <ol type="1" reversed>
        <li>First Item</li>
        <li>Second Item</li>
        <li>Third Item</li>
    </ol>

    <hr>

    <!-- Unordered lists (<ul>) are for items where order is not important. -->
    <ul type="square">
        <li>First Item</li>
        <li>Second Item</li>
        <li>Third Item</li>
    </ul>

    <hr>

    <!-- Description lists (<dl>) pair a term (<dt>) with its description (<dd>). -->
    <dl>
        <dt>HTML</dt>
        <dd>HTML stands for HyperText Markup Language.</dd>
        <dt>CSS</dt>
        <dd>CSS stands for Cascading Style Sheets.</dd>
    </dl>
</body>
</html>
