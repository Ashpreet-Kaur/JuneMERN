<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>
<body>
    <!-- Lists are used to group related items together.
        While writing content on a webpage , we often need to group related items together or present the information in point form, rather then writing long paragraphs. This is done  for better readabilty and make it easier for users to read and understand the content.
    -->

    <!-- Attributes -are the properties that define the characteristics and appearance of thh HTML elements  -->
 

    <!-- Ordered Lists -->

    <ol type="h"  reversed>
        <li>First Item</li>
        <li>Second Item</li>
        <li>Third Item</li>
    </ol>


    <hr>


    <ul type="square">
        <li>First Item</li>
        <li>Second Item</li>
        <li>Third Item</li>
    </ul>


    <hr>


    <!-- Description Lists - is used to define items and their description 
     dl  - description list
     dt - description term (the item)
     dd - description definition (the description of the item) -->

     <dl>
        <dt>HTML</dt>
        <dd>HTML stands for HyperTextMarkup Language</dd>
        <dt>CSS</dt>
        <dd>CSS stand for Cascading Stylesheets</dd>
     </dl>

</body>
</html>
